<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandingkan Bilangan</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-80px) rotate(720deg); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }
    .pop-in { animation: popIn 0.4s ease-out forwards; }
    .bounce-anim { animation: bounce 0.5s ease; }
    .shake-anim { animation: shake 0.4s ease; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .confetti-piece { animation: confetti 1s ease-out forwards; }
    
    .btn-answer {
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .btn-answer:hover {
      transform: scale(1.08);
      filter: brightness(1.1);
    }
    .btn-answer:active {
      transform: scale(0.95);
    }

    .mode-btn {
      transition: all 0.2s ease;
    }
    .mode-btn:hover {
      transform: translateY(-2px);
    }
    .mode-btn.active {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .star { display: inline-block; }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: #FFF8E7;"><!-- Header -->
   <header class="text-center pt-6 pb-3 px-4">
    <h1 id="titleEl" class="text-3xl md:text-4xl font-black tracking-tight" style="color: #FF6B6B;">🔢 Bandingkan Bilangan 🔢</h1>
    <p class="text-base mt-1 font-semibold" style="color: #7C6F64;">Mana yang lebih besar, lebih kecil, atau sama?</p>
   </header><!-- Mode Selector -->
   <div class="flex justify-center gap-3 px-4 pb-4 flex-wrap"><button onclick="setMode('angka')" id="modeAngka" class="mode-btn active px-5 py-2.5 rounded-full font-bold text-white text-sm shadow-md" style="background:#FF6B6B;">🔢 Angka</button> <button onclick="setMode('emoji')" id="modeEmoji" class="mode-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-md" style="background:#E0E0E0; color:#555;">🍎 Emoji</button> <button onclick="setMode('kata')" id="modeKata" class="mode-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-md" style="background:#E0E0E0; color:#555;">✏️ Kata</button>
   </div><!-- Score -->
   <div class="flex justify-center gap-6 px-4 pb-3">
    <div class="flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold text-sm" style="background:#C8F7C5; color:#2D7A2D;">
     ✅ Benar: <span id="scoreCorrect">0</span>
    </div>
    <div class="flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold text-sm" style="background:#FFD3D3; color:#C0392B;">
     ❌ Salah: <span id="scoreWrong">0</span>
    </div>
   </div><!-- Main Game Area -->
   <main class="max-w-lg mx-auto px-4 pb-6"><!-- Numbers Display -->
    <div class="flex items-center justify-center gap-4 md:gap-6 mb-5">
     <div id="leftBox" class="flex flex-col items-center justify-center w-32 h-32 md:w-40 md:h-40 rounded-3xl shadow-lg float-anim" style="background:#FFD93D;">
     </div>
     <div class="text-4xl md:text-5xl font-black" style="color:#7C6F64;">
      ?
     </div>
     <div id="rightBox" class="flex flex-col items-center justify-center w-32 h-32 md:w-40 md:h-40 rounded-3xl shadow-lg float-anim" style="background:#6BCB77; animation-delay: 0.5s;">
     </div>
    </div><!-- Answer Buttons -->
    <div id="answersContainer" class="flex justify-center gap-3 md:gap-4 mb-4 flex-wrap">
    </div><!-- Feedback -->
    <div id="feedback" class="text-center min-h-[60px] flex items-center justify-center">
    </div><!-- Next Button -->
    <div class="text-center mt-2"><button id="nextBtn" onclick="newQuestion()" class="hidden px-8 py-3 rounded-full font-bold text-white text-lg shadow-lg btn-answer" style="background:#4ECDC4;"> Soal Berikutnya ➡️ </button>
    </div>
   </main>
  </div>
  <script>
  const EMOJIS = ['🍎','🌟','🐱','🎈','🍰','🌻','🐶','🦋','🍊','🐸'];
  let mode = 'angka';
  let leftNum = 0, rightNum = 0;
  let correct = 0, wrong = 0;
  let answered = false;

  const defaultConfig = {
    app_title: 'Bandingkan Bilangan',
    correct_message: 'Hebat! Kamu Benar! 🎉',
    wrong_message: 'Coba Lagi Ya! 💪',
    background_color: '#FFF8E7',
    surface_color: '#FFFFFF',
    text_color: '#5D4E37',
    primary_action_color: '#FF6B6B',
    secondary_action_color: '#4ECDC4',
    font_family: 'Nunito',
    font_size: 16
  };

  let config = { ...defaultConfig };

  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (c) => {
      config = c;
      const app = document.getElementById('app');
      const title = document.getElementById('titleEl');
      const cf = (k) => c[k] || defaultConfig[k];

      app.style.background = cf('background_color');
      title.textContent = '🔢 ' + cf('app_title') + ' 🔢';
      title.style.color = cf('primary_action_color');

      const font = cf('font_family');
      const base = cf('font_size');
      document.querySelectorAll('*').forEach(el => {
        el.style.fontFamily = `${font}, Nunito, sans-serif`;
      });
      title.style.fontSize = `${base * 2}px`;

      document.getElementById('modeAngka').style.background = mode === 'angka' ? cf('primary_action_color') : '#E0E0E0';
      document.getElementById('modeEmoji').style.background = mode === 'emoji' ? cf('primary_action_color') : '#E0E0E0';
      document.getElementById('modeKata').style.background = mode === 'kata' ? cf('primary_action_color') : '#E0E0E0';

      document.getElementById('nextBtn').style.background = cf('secondary_action_color');
    },
    mapToCapabilities: (c) => ({
      recolorables: [
        { get: () => c.background_color || defaultConfig.background_color, set: v => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => c.surface_color || defaultConfig.surface_color, set: v => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => c.text_color || defaultConfig.text_color, set: v => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => c.primary_action_color || defaultConfig.primary_action_color, set: v => { c.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
        { get: () => c.secondary_action_color || defaultConfig.secondary_action_color, set: v => { c.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => c.font_family || defaultConfig.font_family,
        set: v => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => c.font_size || defaultConfig.font_size,
        set: v => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (c) => new Map([
      ['app_title', c.app_title || defaultConfig.app_title],
      ['correct_message', c.correct_message || defaultConfig.correct_message],
      ['wrong_message', c.wrong_message || defaultConfig.wrong_message]
    ])
  });

  function cf(k) { return config[k] || defaultConfig[k]; }

  function setMode(m) {
    mode = m;
    ['modeAngka','modeEmoji','modeKata'].forEach(id => {
      const el = document.getElementById(id);
      const isActive = id === 'mode' + m.charAt(0).toUpperCase() + m.slice(1);
      el.classList.toggle('active', isActive);
      el.style.background = isActive ? cf('primary_action_color') : '#E0E0E0';
      el.style.color = isActive ? '#fff' : '#555';
    });
    newQuestion();
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function numberToWord(n) {
    const words = ['nol','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh',
      'sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas','dua puluh'];
    return words[n] || String(n);
  }

  function renderEmojis(count) {
    const emoji = EMOJIS[randInt(0, EMOJIS.length - 1)];
    let html = '<div class="emoji-grid">';
    for (let i = 0; i < count; i++) {
      html += `<span class="text-2xl md:text-3xl">${emoji}</span>`;
    }
    html += '</div>';
    return html;
  }

  function renderBox(el, num, emoji) {
    if (mode === 'angka') {
      el.innerHTML = `<span class="text-5xl md:text-6xl font-black" style="color:#5D4E37;">${num}</span>`;
    } else if (mode === 'emoji') {
      el.innerHTML = `<span class="text-lg font-bold mb-1" style="color:#5D4E37;">${num}</span>${renderEmojis(num)}`;
    } else {
      el.innerHTML = `<span class="text-xl md:text-2xl font-extrabold text-center px-2 leading-tight" style="color:#5D4E37;">${numberToWord(num)}</span>
        <span class="text-sm mt-1 opacity-60">(${num})</span>`;
    }
  }

  function getCorrectAnswer() {
    if (leftNum > rightNum) return '>';
    if (leftNum < rightNum) return '<';
    return '=';
  }

  function renderAnswers() {
    const container = document.getElementById('answersContainer');
    const answers = [
      { symbol: '<', label: 'Lebih Kecil', color: '#FF6B6B' },
      { symbol: '=', label: 'Sama Dengan', color: '#FFD93D' },
      { symbol: '>', label: 'Lebih Besar', color: '#6BCB77' }
    ];
    container.innerHTML = answers.map(a => `
      <button onclick="checkAnswer('${a.symbol}')" class="btn-answer pop-in flex flex-col items-center px-5 py-3 md:px-7 md:py-4 rounded-2xl shadow-lg font-bold text-white" style="background:${a.color}; min-width: 90px;">
        <span class="text-3xl md:text-4xl">${a.symbol}</span>
        <span class="text-xs mt-1">${a.label}</span>
      </button>
    `).join('');
  }

  function checkAnswer(ans) {
    if (answered) return;
    answered = true;
    const correctAns = getCorrectAnswer();
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');

    if (ans === correctAns) {
      correct++;
      document.getElementById('scoreCorrect').textContent = correct;
      feedback.innerHTML = `<div class="pop-in text-2xl font-black" style="color:#2D7A2D;">${cf('correct_message')}</div>`;
      // confetti
      for (let i = 0; i < 8; i++) {
        const c = document.createElement('span');
        c.textContent = ['🎉','⭐','🌟','💫','✨','🎊'][randInt(0,5)];
        c.className = 'confetti-piece absolute text-2xl';
        c.style.left = randInt(20, 80) + '%';
        c.style.top = randInt(30, 60) + '%';
        c.style.animationDelay = (i * 0.1) + 's';
        document.getElementById('app').appendChild(c);
        setTimeout(() => c.remove(), 1200);
      }
    } else {
      wrong++;
      document.getElementById('scoreWrong').textContent = wrong;
      feedback.innerHTML = `<div class="shake-anim text-2xl font-black" style="color:#C0392B;">${cf('wrong_message')}<br>
        <span class="text-lg">Jawabannya: <span class="text-3xl">${leftNum} ${correctAns} ${rightNum}</span></span></div>`;
    }

    // Highlight correct button
    const buttons = document.getElementById('answersContainer').querySelectorAll('button');
    buttons.forEach(btn => {
      const sym = btn.querySelector('span').textContent;
      if (sym === correctAns) {
        btn.classList.add('bounce-anim');
        btn.style.boxShadow = '0 0 20px rgba(0,200,0,0.5)';
      } else {
        btn.style.opacity = '0.4';
      }
      btn.style.pointerEvents = 'none';
    });

    nextBtn.classList.remove('hidden');
  }

  function newQuestion() {
    answered = false;
    document.getElementById('feedback').innerHTML = '';
    document.getElementById('nextBtn').classList.add('hidden');

    // Generate numbers 0-20, with ~20% chance of equal
    if (Math.random() < 0.2) {
      leftNum = randInt(0, 20);
      rightNum = leftNum;
    } else {
      leftNum = randInt(0, 20);
      rightNum = randInt(0, 20);
      while (rightNum === leftNum) rightNum = randInt(0, 20);
    }

    // Limit emoji mode to max 10
    if (mode === 'emoji') {
      leftNum = Math.min(leftNum, 10);
      rightNum = Math.min(rightNum, 10);
      if (leftNum === 0) leftNum = randInt(1, 10);
      if (rightNum === 0) rightNum = randInt(1, 10);
    }

    renderBox(document.getElementById('leftBox'), leftNum);
    renderBox(document.getElementById('rightBox'), rightNum);
    renderAnswers();
  }

  newQuestion();
  lucide.createIcons();
</script>

</html>
